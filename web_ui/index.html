<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Lesion Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header>
      <div class="logo">🔬</div>
      <div class="header-text">
        <h1>Skin Lesion Detection</h1>
        <p>AI-powered dermatology analysis · Gemini Vision</p>
      </div>
      <span class="badge">Research Tool</span>

      <div class="settings-wrap">
        <button class="settings-btn" id="settingsBtn" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
            <circle cx="7"  cy="6"  r="2.5" fill="currentColor" stroke="none"/>
            <circle cx="15" cy="12" r="2.5" fill="currentColor" stroke="none"/>
            <circle cx="9"  cy="18" r="2.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>

        <div class="settings-panel" id="settingsPanel">
          <div class="sp-title">Settings</div>
          <div class="sp-body">
            <div class="setting-row">
              <div class="setting-label">
                <span>Runs per Image</span>
                <span class="setting-desc">Each run = one Gemini API call.<br>Higher → more stable, slower &amp; costlier.</span>
              </div>
              <div class="stepper">
                <button class="stepper-btn" id="stepperMinus">−</button>
                <span class="stepper-val" id="stepperVal">3</span>
                <button class="stepper-btn" id="stepperPlus">＋</button>
              </div>
            </div>
          </div>
          <div class="sp-footer">
            <button class="btn-apply" id="applyBtn">Apply</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" multiple />

      <!-- Empty state -->
      <div id="emptyState">
        <span class="upload-icon">🩻</span>
        <h2>Drop skin lesion images here</h2>
        <p>Supports JPG, PNG, WebP · Multiple files allowed</p>
        <label class="upload-btn" id="browseBtn">＋ &nbsp;Browse Files</label>
      </div>

      <!-- Files state -->
      <div id="filesState" style="display:none;">
        <div class="preview-grid" id="previewGrid"></div>
        <div class="files-actions">
          <button class="add-more-btn" id="addMoreBtn">＋ Add more</button>
          <button class="clear-btn" id="clearBtn">Clear all</button>
        </div>
      </div>
    </div>

    <!-- Analyse Button -->
    <div class="analyse-wrap" id="analyseWrap">
      <button class="btn-analyse" id="analyseBtn">Analyse Images</button>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection" style="display:none;">
      <p class="results-title">Analysis Results</p>
      <div id="resultsContainer"></div>
    </div>

  </div>

  <script src="script.js?v=7"></script>
</body>
</html>
