<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Lesion Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- Header -->
    <header>
      <div class="logo">🔬</div>
      <div class="header-text">
        <h1>Skin Lesion Detection</h1>
        <p>AI-powered dermatology analysis · Gemini Vision</p>
      </div>
      <span class="badge">Research Tool</span>
      <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
    </header>

    <!-- Settings Modal -->
    <div class="settings-backdrop" id="settingsBackdrop">
      <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
          <span>Settings</span>
          <button class="settings-close" id="settingsClose">✕</button>
        </div>
        <div class="settings-body">
          <div class="setting-row">
            <div class="setting-label">
              <span>API Runs per Image</span>
              <span class="setting-desc">Each run is one Gemini call.<br>Higher = more stable, slower &amp; costlier.</span>
            </div>
            <div class="stepper">
              <button class="stepper-btn" id="stepperMinus">−</button>
              <span class="stepper-val" id="stepperVal">3</span>
              <button class="stepper-btn" id="stepperPlus">＋</button>
            </div>
          </div>
        </div>
        <div class="settings-footer">
          <button class="btn-apply" id="applyBtn">Apply</button>
        </div>
      </div>
    </div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" multiple />

      <!-- Empty state -->
      <div id="emptyState">
        <span class="upload-icon">🩻</span>
        <h2>Drop skin lesion images here</h2>
        <p>Supports JPG, PNG, WebP · Multiple files allowed</p>
        <label class="upload-btn" id="browseBtn">＋ &nbsp;Browse Files</label>
      </div>

      <!-- Files state -->
      <div id="filesState" style="display:none;">
        <div class="preview-grid" id="previewGrid"></div>
        <div class="files-actions">
          <button class="add-more-btn" id="addMoreBtn">＋ Add more</button>
          <button class="clear-btn" id="clearBtn">Clear all</button>
        </div>
      </div>
    </div>

    <!-- Analyse Button -->
    <div class="analyse-wrap" id="analyseWrap">
      <button class="btn-analyse" id="analyseBtn">Analyse Images</button>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection" style="display:none;">
      <p class="results-title">Analysis Results</p>
      <div id="resultsContainer"></div>
    </div>

  </div>

  <script src="script.js?v=5"></script>
</body>
</html>
